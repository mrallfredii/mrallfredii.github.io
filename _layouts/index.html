---
layout: default
---

<div class="posts-list" style="padding-top: 20px;">
    <section style="margin-bottom: 40px; padding: 18px; border: 1px solid #2f4f2f; background-color: rgb(24, 30, 12);">
        <span style="color: #666; font-family: monospace;">featured</span>
        <h2 style="margin-top: 8px; color: azure;">Hacking Course</h2>
        <p style="line-height: 1.7;">
            Access the full course hub hosted on Notion from inside this site.
        </p>
        <a href="{{ '/hacking-course/' | relative_url }}" style="text-decoration: none; color: #9fef00; font-family: monospace;">Open course page</a>
    </section>
    {%- for post in site.posts -%}
        <article style="margin-bottom: 50px; background-color:rgb(33, 43, 15); cursor: default;"> 
            <header style="padding-left: 10px;">
                <span style="color: #666; font-family: monospace;">{{ post.date | date: "%Y-%m-%d" }}</span>
                <h2 style="margin-top: 5px; color: azure; text-align: center;">
                    {{ post.title }}
                </h2>
            </header>

            <a href="{{ post.url }}" class="read-more" style="text-decoration: none; padding-left: 10px; color:#666">Read more</a>
        </article>
    {%- endfor -%}
</div>
