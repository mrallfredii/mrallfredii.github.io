name: Notion Sync
on:
  workflow_dispatch:

jobs:
  notion_to_github:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Notion to Markdown
        uses: dvanoni/notion-github-sync@main
        with:
          notion_token: ${{ secrets.NOTION_TOKEN }}
          notion_database_id: ${{ secrets.NOTION_DATABASE_ID }}
          output_path: _posts
          filter_prop: Publicar
          filter_value: true