name: Notion Sync
on:
  workflow_dispatch: # Esto activa el botón para hacerlo manual
  schedule:
    - cron: '0 * * * *' # Revisa cada hora automáticamente

jobs:
  notion_to_jekyll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Notion to Markdown
        uses: m-radzikowski/notion-github-sync@v1
        with:
          notion_token: ${{ secrets.NOTION_TOKEN }}
          notion_database_id: ${{ secrets.NOTION_DATABASE_ID }}
          output_path: _posts # Carpeta donde Jekyll guarda las notas
          filter_prop: Publicar
          filter_value: true